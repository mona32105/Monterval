<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Run Buddy Pro</title>
    
    <!-- iPhone Home Screen (PWA) Optimization -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Run Buddy">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3048/3048384.png">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #000000;
            --card: #121214;
            --accent: #2563eb;
            --accent-glow: rgba(37, 99, 235, 0.4);
            --text: #ffffff;
            --text-dim: #71717a;
            --run-color: #ef4444;
            --walk-color: #3b82f6;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .app-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .header {
            padding: calc(var(--safe-top) + 1.5rem) 1.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(18, 18, 20, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 50;
        }

        .header h1 {
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            color: var(--accent);
        }

        .status-tag {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.6rem;
            font-weight: 800;
            color: #22c55e;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0px rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0px rgba(34, 197, 94, 0); }
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            padding: 0.5rem;
            cursor: pointer;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .screen {
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            text-align: center;
        }

        .hidden { display: none !important; }

        .app-hero-icon {
            width: 100px;
            height: 100px;
            background: var(--accent);
            border-radius: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 30px var(--accent-glow);
        }

        .welcome-msg h2 { font-size: 2rem; font-weight: 900; }
        .welcome-msg p { color: var(--text-dim); margin-top: 0.4rem; font-size: 0.9rem; }

        .ios-tip {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 1rem;
            border-radius: 1.2rem;
            text-align: left;
        }

        .ios-tip span { font-size: 0.6rem; font-weight: 900; color: var(--accent); display: block; margin-bottom: 0.3rem; }
        .ios-tip p { font-size: 0.7rem; color: var(--text-dim); line-height: 1.4; }

        .btn-start {
            width: 100%;
            padding: 1.3rem;
            background: white;
            color: black;
            border: none;
            border-radius: 2rem;
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
        }

        .phase-indicator {
            padding: 0.4rem 1.5rem;
            background: var(--walk-color);
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .main-timer {
            font-size: 7.5rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .timer-subtitle { font-size: 0.55rem; font-weight: 800; color: var(--text-dim); letter-spacing: 0.3em; margin-top: -0.5rem; }

        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            width: 100%;
        }

        .metric-card {
            background: var(--card);
            padding: 1rem;
            border-radius: 1.5rem;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .metric-card label { font-size: 0.55rem; font-weight: 800; color: var(--text-dim); display: block; margin-bottom: 0.2rem; }
        .metric-card span { font-size: 1.8rem; font-weight: 900; }

        .action-row {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .btn-round {
            width: 3.5rem;
            height: 3.5rem;
            background: var(--card);
            border: none;
            border-radius: 1.2rem;
            color: var(--text-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-play-pause {
            width: 5.5rem;
            height: 5.5rem;
            background: white;
            border: none;
            border-radius: 50%;
            color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 40px rgba(255,255,255,0.1);
        }

        .progress-track {
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            margin-top: auto;
            margin-bottom: var(--safe-bottom);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: width 0.4s ease-linear;
            box-shadow: 0 0 10px var(--accent);
        }

        .modal {
            position: fixed;
            inset: 0;
            background: black;
            z-index: 100;
            padding: 2rem;
            padding-top: calc(var(--safe-top) + 2rem);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .btn-done {
            padding: 0.5rem 1.2rem;
            background: white;
            color: black;
            border: none;
            border-radius: 1rem;
            font-weight: 900;
        }

        .setting-item {
            background: var(--card);
            padding: 1rem 1.5rem;
            border-radius: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .setting-item label { font-size: 0.7rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; }
        .setting-item input {
            background: transparent;
            border: none;
            color: var(--accent);
            font-size: 1.4rem;
            font-weight: 900;
            text-align: right;
            width: 80px;
            outline: none;
        }
    </style>
</head>
<body>
    <!-- Hidden Silent Looping Audio for Background Survival -->
    <audio id="iosAudioHack" loop playsinline src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA=="></audio>

    <div class="app-container">
        <header class="header">
            <div>
                <h1>RUN BUDDY PRO</h1>
                <div class="status-tag"><span class="pulse-dot"></span>ENGINE: HARDENED</div>
            </div>
            <div style="display: flex; gap: 8px;">
                <button id="muteBtn" class="icon-btn"><i data-lucide="volume-2"></i></button>
                <button id="settingsBtn" class="icon-btn"><i data-lucide="settings"></i></button>
            </div>
        </header>

        <main>
            <div id="idleScreen" class="screen">
                <div class="app-hero-icon"><i data-lucide="activity" size="60" color="white" stroke-width="3"></i></div>
                <div class="welcome-msg">
                    <h2>READY?</h2>
                    <p>8 Rounds • 1m Run / 3m Walk</p>
                    <p style="color: var(--accent); font-weight: 800; font-size: 0.8rem;">Session: 42:00</p>
                </div>
                <div class="ios-tip">
                    <span>IOS BACKGROUND ACTIVE</span>
                    <p>App stays alive under lock-screen. Keep silent switch OFF.</p>
                </div>
                <button id="startBtn" class="btn-start">START WORKOUT</button>
            </div>

            <div id="workoutScreen" class="screen hidden">
                <div id="phaseTag" class="phase-indicator">WARM UP</div>
                <div>
                    <div id="timerValue" class="main-timer">05:00</div>
                    <p class="timer-subtitle">TIME REMAINING</p>
                </div>
                <div class="metrics">
                    <div class="metric-card"><label>ROUND</label><span id="roundValue">1/8</span></div>
                    <div class="metric-card"><label>NEXT</label><span id="nextValue" style="color: var(--accent)">RUN</span></div>
                </div>
                <div class="action-row">
                    <button id="resetBtn" class="btn-round"><i data-lucide="rotate-ccw"></i></button>
                    <button id="playBtn" class="btn-play-pause"><i data-lucide="pause"></i></button>
                    <button id="skipBtn" class="btn-round"><i data-lucide="chevron-right"></i></button>
                </div>
            </div>
        </main>

        <div class="progress-track"><div id="progressFill" class="progress-bar"></div></div>

        <div id="settingsModal" class="modal hidden">
            <div class="modal-header"><h2>CONFIG</h2><button id="saveSettings" class="btn-done">DONE</button></div>
            <div class="setting-item"><label>Warm Up (s)</label><input type="number" id="in-warmup" value="300"></div>
            <div class="setting-item"><label>Run (s)</label><input type="number" id="in-run" value="60"></div>
            <div class="setting-item"><label>Walk (s)</label><input type="number" id="in-walk" value="180"></div>
            <div class="setting-item"><label>Rounds</label><input type="number" id="in-rounds" value="8"></div>
        </div>
    </div>

    <script>
        let status = 'idle', phase = 'warmup', timeLeft = 0, currentRound = 1, isMuted = false;
        let config = { warmup: 300, run: 60, walk: 180, rounds: 8 };
        let timerRef = null, targetTimestamp = null, audioCtx = null, subsonicHeartbeat = null;

        const ui = {
            idle: document.getElementById('idleScreen'),
            workout: document.getElementById('workoutScreen'),
            timer: document.getElementById('timerValue'),
            phase: document.getElementById('phaseTag'),
            round: document.getElementById('roundValue'),
            next: document.getElementById('nextValue'),
            progress: document.getElementById('progressFill'),
            playBtn: document.getElementById('playBtn'),
            audioHack: document.getElementById('iosAudioHack')
        };

        function wakeTheEngine() {
            ui.audioHack.play().catch(() => {});
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (!subsonicHeartbeat) {
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.001, audioCtx.currentTime); 
                const osc = audioCtx.createOscillator();
                osc.type = 'sine'; osc.frequency.setValueAtTime(1, audioCtx.currentTime);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); subsonicHeartbeat = osc;
            }
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({ title: "Run Buddy Pro", artist: "Active Tracking" });
                navigator.mediaSession.setActionHandler('play', toggleWorkout);
                navigator.mediaSession.setActionHandler('pause', toggleWorkout);
            }
        }

        function speak(text) {
            if ('speechSynthesis' in window && !isMuted) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                window.speechSynthesis.speak(u);
            }
        }

        function updateUI() {
            const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            ui.timer.textContent = `${m}:${s.toString().padStart(2, '0')}`;
            ui.round.textContent = `${currentRound}/${config.rounds}`;
            ui.phase.textContent = phase === 'warmup' ? 'WARM UP' : phase.toUpperCase();
            ui.next.textContent = phase === 'run' ? 'WALK' : 'RUN';
            ui.phase.style.backgroundColor = phase === 'run' ? 'var(--run-color)' : 'var(--walk-color)';
            const total = config[phase], progress = ((currentRound - 1 + (total - timeLeft) / total) / config.rounds) * 100;
            ui.progress.style.width = `${Math.min(100, progress)}%`;
        }

        function transition() {
            if (phase === 'warmup') { phase = 'run'; timeLeft = config.run; speak("Run."); }
            else if (phase === 'run') { phase = 'walk'; timeLeft = config.walk; speak("Walk."); }
            else if (phase === 'walk') {
                if (currentRound < config.rounds) { currentRound++; phase = 'run'; timeLeft = config.run; speak("Run."); }
                else { phase = 'warmup'; stopWorkout(); speak("Done."); return; }
            }
            targetTimestamp = Date.now() + (timeLeft * 1000);
            updateUI();
        }

        function startWorkout() {
            wakeTheEngine();
            status = 'active'; phase = 'warmup'; timeLeft = config.warmup; currentRound = 1;
            targetTimestamp = Date.now() + (timeLeft * 1000);
            ui.idle.classList.add('hidden'); ui.workout.classList.remove('hidden');
            speak("Warm up.");
            runLoop();
        }

        function runLoop() {
            clearInterval(timerRef);
            timerRef = setInterval(() => {
                timeLeft = Math.max(0, Math.ceil((targetTimestamp - Date.now()) / 1000));
                updateUI();
                if (timeLeft <= 0) transition();
            }, 500);
        }

        function toggleWorkout() {
            if (status === 'active') {
                status = 'paused'; clearInterval(timerRef); ui.audioHack.pause();
                ui.playBtn.innerHTML = '<i data-lucide="play"></i>';
            } else {
                status = 'active'; wakeTheEngine(); targetTimestamp = Date.now() + (timeLeft * 1000);
                runLoop(); ui.playBtn.innerHTML = '<i data-lucide="pause"></i>';
            }
            lucide.createIcons();
        }

        function stopWorkout() {
            clearInterval(timerRef); status = 'idle'; ui.audioHack.pause();
            ui.idle.classList.remove('hidden'); ui.workout.classList.add('hidden');
            ui.progress.style.width = '0%';
        }

        document.getElementById('startBtn').onclick = startWorkout;
        document.getElementById('resetBtn').onclick = stopWorkout;
        document.getElementById('playBtn').onclick = toggleWorkout;
        document.getElementById('skipBtn').onclick = transition;
        document.getElementById('muteBtn').onclick = () => { isMuted = !isMuted; lucide.createIcons(); };
        document.getElementById('settingsBtn').onclick = () => document.getElementById('settingsModal').classList.remove('hidden');
        document.getElementById('saveSettings').onclick = () => {
            config.warmup = parseInt(document.getElementById('in-warmup').value);
            config.run = parseInt(document.getElementById('in-run').value);
            config.walk = parseInt(document.getElementById('in-walk').value);
            config.rounds = parseInt(document.getElementById('in-rounds').value);
            document.getElementById('settingsModal').classList.add('hidden');
        };
        lucide.createIcons();
    </script>
</body>
</html>
